services:
  # used to build the production image
  r:
    image: r:${MAJOR_VERSION}
    build:
      context: .
      dockerfile: ${MAJOR_VERSION}/Dockerfile
      target: r
      cache_from:  # should speed up the build in CI, where we have a cold cache
        - ghcr.io/opensafely-core/base-docker:${BASE}
        - ghcr.io/opensafely-core/r:${MAJOR_VERSION}
      args:
        # this makes the image work for later cache_from: usage
        - BUILDKIT_INLINE_CACHE=1
        # env vars supplied by make/just
        - BUILD_DATE
        - REVISION
        - VERSION
        - BASE
        - MAJOR_VERSION
        - CRAN_DATE
        - REPOS
      secrets:
        - ubuntu_pro_token
    init: true
    platform: linux/amd64
  add-package:
    extends: r
    image: "${IMAGE_TAG:-}"
    build:
      target: add-package
      args:
       - PACKAGE
       - REPOS
      secrets:
        - ubuntu_pro_token
    platform: linux/amd64
  rstudio:
    extends: r
    image: rstudio:${MAJOR_VERSION}
    build:
      target: rstudio
      args:
        # supplied by just
        - RSTUDIO_BASE_URL
        - RSTUDIO_DEB
      secrets:
        - ubuntu_pro_token
    ports:
      - 8787:8787
    # no curl/wget in the image, so probe the port with bash's /dev/tcp;
    # this makes `docker compose up --wait` block until rserver is listening
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8787"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    platform: linux/amd64
    volumes:
      - ${PWD}:/workspace
      - ${HOME}/.gitconfig:/home/rstudio/local-gitconfig
    environment:
      HOSTPLATFORM: ${HOSTPLATFORM}
      HOSTUID: ${HOSTUID}

secrets:
  ubuntu_pro_token:
    file: ${UBUNTU_PRO_TOKEN_FILE:-.secrets/ubuntu_pro_token}
